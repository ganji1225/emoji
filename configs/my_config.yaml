train:
  batch_size: 2
  gradient_accumulation_steps: 2
  num_workers: 4
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 2
  allow_tf32: true
  compile_model: false
  precision: bf16
  optimizer: muon
  muon_momentum: 0.95
  learning_rate: 0.0001
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_eps: 1.0e-08
  lr_scheduler: wsd
  warmup_steps: 300
  stable_steps: 2100
  min_lr_scale: 0.01
  max_steps: 3000
  max_text_len: 256
  text_condition_dropout: 0.15
  speaker_condition_dropout: 0.15
  timestep_stratified: true
  max_latent_steps: 750
  fixed_target_latent_steps: 750
  fixed_target_full_mask: true
  log_every: 300
  save_every: 300
  wandb_enabled: false
  wandb_project: null
  wandb_run_name: null
  valid_ratio: 0.1
  valid_every: 300
  seed: 0
